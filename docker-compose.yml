version: '3.8'
services:
  api:
    build: .
    container_name: credflow-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    depends_on:
      - db

  db:
    image: postgres:18.3
    container_name: credflow-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: credflow-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: